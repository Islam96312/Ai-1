name: CI - Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest pytest-cov pytest-asyncio \
            fastapi httpx \
            sqlalchemy pydantic pydantic-settings \
            pandas numpy scikit-learn xgboost \
            PyYAML requests celery redis

      - name: Stub MetaTrader5 for Linux CI
        run: |
          mkdir -p stubs
          cat > stubs/MetaTrader5.py << 'PYEOF'
          TIMEFRAME_M1=1; TIMEFRAME_M5=5; TIMEFRAME_M15=15; TIMEFRAME_M30=30
          TIMEFRAME_H1=16385; TIMEFRAME_H4=16388; TIMEFRAME_D1=16408
          ORDER_TYPE_BUY=0; ORDER_TYPE_SELL=1
          TRADE_ACTION_DEAL=1
          ORDER_TIME_GTC=1; ORDER_FILLING_IOC=1
          TRADE_RETCODE_DONE=10009; TRADE_RETCODE_REQUOTE=10004
          TRADE_RETCODE_PRICE_CHANGED=10006; TRADE_RETCODE_CONNECTION=10005
          TRADE_RETCODE_TIMEOUT=10010
          def initialize(**k): return True
          def shutdown(): pass
          def account_info(): return None
          def positions_get(): return []
          def symbol_info(s): return None
          def symbol_info_tick(s): return None
          def copy_rates_from_pos(s,tf,p,c): return None
          def order_send(r): return type('R',(),{'retcode':TRADE_RETCODE_DONE,'order':0,'comment':'ok'})()
          def last_error(): return (0,'')
          PYEOF

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/stubs" >> $GITHUB_ENV

      - name: Create minimal .env for tests
        run: |
          cat > .env << 'EOF'
          DB_USER=postgres
          DB_PASSWORD=test
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=trading_test
          REDIS_HOST=localhost
          REDIS_PORT=6379
          MT5_LOGIN=0
          MT5_PASSWORD=test
          MT5_SERVER=test
          TELEGRAM_BOT_TOKEN=
          TELEGRAM_CHAT_ID=
          NEWS_API_KEY=
          MONITORED_SYMBOLS=["EURUSD","GBPUSD"]
          DEFAULT_TIMEFRAME=H1
          EOF

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
