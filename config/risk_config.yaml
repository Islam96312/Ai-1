# ============================================================
# Risk Management Configuration
# Tune these values to match your trading strategy & broker
# ============================================================

# --- ATR-Based SL/TP Multipliers ---
atr_multiplier_sl:  1.5   # Stop Loss  = ATR × 1.5
atr_multiplier_tp1: 2.0   # Take Profit 1 = ATR × 2.0  (R:R = 1.33)
atr_multiplier_tp2: 3.5   # Take Profit 2 = ATR × 3.5  (Partial close)

# --- Signal Quality Thresholds ---
min_confidence_to_execute: 65.0   # Minimum final_score to allow trade (0–100)
min_risk_reward:           1.2    # Minimum R:R ratio to allow trade

# --- Position & Exposure Limits ---
max_open_trades:        5         # Maximum concurrent open positions
max_currency_exposure:  0.03      # Max 3% of balance exposed to single currency
max_daily_drawdown:     0.05      # Halt trading if daily loss > 5% of balance
risk_per_trade:         0.01      # Risk 1% of balance per trade

# --- Spread Filter ---
max_spread_pips:        3.0       # Skip trade if spread > 3 pips

# --- Session Filter (UTC hours) ---
# Only trade during active Forex sessions
allowed_trading_hours:
  start: 7    # 07:00 UTC (London open)
  end:   20   # 20:00 UTC (New York close)

# --- Symbol-Specific Pip Sizes ---
# Used for accurate pip calculation
pip_sizes:
  EURUSD: 0.0001
  GBPUSD: 0.0001
  USDJPY: 0.01
  USDCHF: 0.0001
  AUDUSD: 0.0001
  NZDUSD: 0.0001
  USDCAD: 0.0001
  XAUUSD: 0.1
  XAGUSD: 0.001
  default: 0.0001
