# ══════════════════════════════════════════════════════════════════
#  Risk Configuration
#  Loaded automatically by RiskEngine and RiskFilters at startup.
#  All values here override the hardcoded defaults in the code.
# ══════════════════════════════════════════════════════════════════

# ── RiskEngine: ATR multipliers for SL / TP levels ───────────────
risk_engine:
  # Stop Loss   = ATR × sl_atr_mult
  # TP1 (first target)  = ATR × tp1_atr_mult  →  R:R ≈ 1.33
  # TP2 (runner target) = ATR × tp2_atr_mult  →  R:R ≈ 2.33
  sl_atr_mult:  1.5
  tp1_atr_mult: 2.0
  tp2_atr_mult: 3.5


# ── RiskFilters: trade validation thresholds ─────────────────────
risk_filters:

  # Filter 1 — minimum AI confidence score (0-100)
  # Trades below this score are rejected
  min_confidence: 65.0

  # Filter 2 — minimum Risk:Reward ratio
  # e.g. 1.2 means you must risk 1 to potentially gain 1.2
  min_rr: 1.2

  # Filter 3 — allowed trading session windows (UTC hours)
  # Trades outside ALL windows are rejected
  sessions:
    - name: London
      open: 7
      close: 16
    - name: NewYork
      open: 13
      close: 21

  # Filter 4 — maximum number of open positions at the same time
  max_open_trades: 5

  # Filter 5 — maximum risk per trade as % of account balance
  # e.g. 2.0 = risk no more than 2% of balance on a single trade
  max_risk_pct: 2.0

  # Filter 6 — high-impact news block
  # Trade is blocked if event_risk_score < this value
  # event_risk_score is negative: -70 means 70-point penalty
  news_block_threshold: -70.0
